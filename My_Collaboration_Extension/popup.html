<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    body { width: 300px; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; padding: 20px; background: #F8FAFC; border-radius: 20px; }
    .header { font-size: 18px; font-weight: 800; color: #4F46E5; display: flex; align-items: center; gap: 10px; margin-bottom: 20px; border-bottom: 2px solid #EEF2FF; padding-bottom: 12px; }
    .card { background: white; padding: 15px; border-radius: 18px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); margin-bottom: 12px; border: 1px solid #F1F5F9; }
    .status-active { color: #10B981; font-weight: 800; font-size: 11px; text-transform: uppercase; }
    .msg { font-size: 12px; color: #64748B; margin-top: 5px; font-weight: 500; }
    .btn { width: 100%; background: linear-gradient(135deg, #6366F1 0%, #4F46E5 100%); color: white; border: none; padding: 14px; border-radius: 14px; font-weight: 700; cursor: pointer; transition: 0.3s; margin-top: 8px; box-shadow: 0 4px 12px rgba(79, 70, 229, 0.2); }
    .btn:hover { background: #4338CA; transform: scale(1.02); }
    .footer { text-align: center; font-size: 9px; color: #CBD5E1; margin-top: 20px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; }
  </style>
</head>
<body>
  <div class="header">📚 EduSync Hub</div>
  <div class="card">
      <div class="status-active">🛡️ Enforcer Mode Active</div>
      <div class="msg" id="statusText">Monitoring distraction-free study sessions...</div>
  </div>
  <button class="btn" id="openHub">Launch Study Hub</button>
  <div class="footer">Collaboration Enforcer v1.1</div>
  <script src="popup.js"></script>
</body>
</html>
